<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="converter.css">
    <title>ValuCalc</title>
</head>
<body>
    <!-- ЗАГОЛОВОК -->
    <h1>Конвертер любого колличества валюты в одну</h1>
    <div class="more-text" style="display:none;">
      <p class="more-btn-text">Этот калькулятор может помочь вам если у вас много разной валюты и вы хотите</p>
      <p class="more-btn-text">увидеть их стоимость в одной. Например:</p>
      <p class="more-btn-text">У меня 2 доллара, 15 рублей, 2 йены. Сколько это будет в евро? и т.п</p>
    </div>
    <button class="read-more-btn">Подробнее...</button>

    <!-- Ячейки -->
<div class="currency-cells">
  
  <div class="cells-container">
    <div class="currency-cell">
      <div class="top-currency-cells">
        <button>USD</button>
        <button>EUR</button>
        <button>RUB</button>

        <select>
          <option value="...">...</option>
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
          <option value="RUB">RUB</option>
          <option value="JPY">JPY</option>
        </select>
        
        <button class="add-cell">+</button>

      </div>  

      <input type="number" min="0" step="1" placeholder="Введите количество">
    </div>
  </div>

</div>

    <script>
        // Скрипт для кнопки "Подробнее..."
        document.querySelector('.read-more-btn').addEventListener('click', function() {
      let moreText = this.previousElementSibling;
      if (moreText.style.display === "none") {
        moreText.style.display = "block";
        this.textContent = "Скрыть";
      } else {
        moreText.style.display = "none";
        this.textContent = "Подробнее...";
      }
      });

        //   Скрипт для кнопки добавления новой ячейки
document.querySelector('.add-cell').addEventListener('click', function() {
  
  const container = document.querySelector('.cells-container');

  const newCell = document.createElement('div');
  newCell.classList.add('currency-cell');

  newCell.innerHTML = `
    <div class="top-currency-cells">
      <button>USD</button>
      <button>EUR</button>
      <button>RUB</button>

      <select>
        <option value="...">...</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="RUB">RUB</option>
        <option value="JPY">JPY</option>
      </select>

      <button class="del-cell"> - </button>
    </div>  

    <input type="number" min="0" step="1" placeholder="Введите количество">
  `;

  newCell.querySelector('.del-cell').addEventListener('click', function() {
    newCell.remove();
  });

  container.appendChild(newCell);
});
    </script>
</body>
</html>
