<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="converter.css">
    <title>ValuCalc</title>
</head>
<body>
<div class="app-wrapper">

    <!-- САЙДБАР КУРСОВ ВАЛЮТ -->
    <aside class="rates-sidebar">
        <div class="rates-sidebar-title">Курсы валют</div>
        <div id="rates-list">
            <div class="rate-row" style="color: var(--muted); font-size:11px; padding: 12px 16px;">
                Загрузка...
            </div>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content">

        <header class="site-header">
            <h1>Valu<span>Calc</span></h1>
            <div class="more-text" style="display:none;">
                <p>Калькулятор для конвертации нескольких валют в одну.</p>
                <p>Например: 2$ + 15₽ + 2¥ → сколько это в €?</p>
            </div>
            <button class="read-more-btn">Подробнее...</button>
        </header>

        <div class="currency-cells">

            <div class="cells-container">
                <h3>У меня есть</h3>
                <div class="top-currency-cells">
                    <button>USD</button>
                    <button>EUR</button>
                    <button>RUB</button>
                    <select>
                        <option value="...">...</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="RUB">RUB</option>
                        <option value="JPY">JPY</option>
                    </select>
                    <button class="add-cell">+</button>
                </div>
                <input type="number" min="0" step="1" placeholder="Введите количество">
            </div>

            <button class="convert-btn">Конвертировать</button>

            <div class="convert-currency-cell">
                <h3>Стоимость</h3>
                <div class="top-currency-cells">
                    <button>USD</button>
                    <button>EUR</button>
                    <button>RUB</button>
                    <select>
                        <option value="...">...</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="RUB">RUB</option>
                        <option value="JPY">JPY</option>
                    </select>
                </div>
                <input type="number" min="0" step="1" placeholder="Результат" disabled>
            </div>

        </div>
    </div>
</div>

<!-- money.js от ЦБ РФ -->
<script src="https://www.cbr-xml-daily.ru/money.js"></script>

<script>
    // ── Заполнить сайдбар курсами из fx.rates ──
    // Показываем только популярные пары относительно RUB
    const SHOW_PAIRS = ['USD', 'EUR', 'GBP', 'JPY', 'CNY', 'BYR', 'KZT', 'TRY', 'CHF', 'AUD'];

    function renderRates() {
        const list = document.getElementById('rates-list');

        if (typeof fx === 'undefined' || !fx.rates) {
            list.innerHTML = '<div style="color:var(--red);font-size:11px;padding:12px 16px;">Ошибка загрузки</div>';
            return;
        }

        const base = fx.base; // обычно "RUB"
        list.innerHTML = SHOW_PAIRS
            .filter(code => fx.rates[code] !== undefined)
            .map(code => {
                const rate = (1 / fx.rates[code]).toFixed(4); // цена 1 единицы в RUB
                return `
                    <div class="rate-row">
                        <span class="rate-pair">${code}/${base}</span>
                        <span class="rate-val">${rate}</span>
                    </div>
                `;
            })
            .join('');
    }

    // money.js от ЦБ грузится синхронно — вызываем сразу
    fetch('https://www.cbr-xml-daily.ru/daily_json.js')
    .then(r => r.json())
    .then(data => {
        fx.base = 'RUB';
        fx.rates = { RUB: 1 };
        for (const [code, info] of Object.entries(data.Valute)) {
            fx.rates[code] = info.Nominal / info.Value;
        }
        renderRates();
    })
    .catch(() => {
        document.getElementById('rates-list').innerHTML =
            '<div style="color:var(--red);font-size:11px;padding:12px 16px;">Ошибка загрузки</div>';
    });

    // ── Кнопка "Подробнее" ──
    document.querySelector('.read-more-btn').addEventListener('click', function () {
        const moreText = this.previousElementSibling;
        const hidden = moreText.style.display === 'none';
        moreText.style.display = hidden ? 'block' : 'none';
        this.textContent = hidden ? 'Скрыть' : 'Подробнее...';
    });

    // ── Кнопка + ──
    document.querySelector('.add-cell').addEventListener('click', function () {
        const container = document.querySelector('.cells-container');
        const newCell = document.createElement('div');
        newCell.classList.add('currency-cell');
        newCell.innerHTML = `
            <div class="top-currency-cells">
                <button>USD</button>
                <button>EUR</button>
                <button>RUB</button>
                <select>
                    <option value="...">...</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="JPY">JPY</option>
                </select>
                <button class="del-cell">−</button>
            </div>
            <input type="number" min="0" step="1" placeholder="Введите количество">
        `;
        newCell.querySelector('.del-cell').addEventListener('click', () => newCell.remove());
        container.appendChild(newCell);
    });
</script>
</body>
</html>
